<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Long</title>
    <link rel="stylesheet" href="mcq.css">
</head>
<body>
    <div class="mcq-container">
        <div class="mcq-card">
            <div class="mcq-question">
                <span class="mcq-qnum">1/10</span>
                <h2>What is the bitch?</h2>
            </div>
            <div class="mcq-choices">
                <button class="mcq-choice" data-correct="false">Hoosun</button>
                <button class="mcq-choice" data-correct="false">Gary</button>
                <button class="mcq-choice" data-correct="true">Mouse</button>
                <button class="mcq-choice" data-correct="false">Horse</button>
            </div>
            <div class="mcq-feedback"></div>
            <div class="mcq-actions">
                <button class="mcq-next" disabled>Next</button>
            </div>
        </div>
    </div>
    <script src="mcq.js"></script>
</body>
</html>
