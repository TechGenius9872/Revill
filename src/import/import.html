<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Stuffs</title>
    <!--Google Font - Inter-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!--Google Font - Instrument Sans-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 20px;
        }
        h1 {
            font-family: 'Instrument Sans', sans-serif;
            color: #004AAD;
            text-align: center;
        }
        #csvImport {
            width: 90%;
            height: 400px;
            font-size: 16px;
            padding: 5px;
            border: 2px solid grey;
            border-radius: 5px;
            margin-top: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .button-holder {
            text-align: center;
            margin-top: 20px;
        }

        .button-holder button {
            display: inline-block;
        }
    </style>
</head>
<body>
    <input type="file" id="fileInput" style="display: none;" />
    <h1>Import your Quizlet Flashcards here!</h1>
    <textarea id="csvImport" placeholder="Paste your content here..."></textarea>
    <div class="button-holder">
        <button style="background-color: #004AAD; color: white; border-radius: 8px; text-align: center; border: none; padding: 20px 80px; cursor: pointer;">Import</button>
    </div>
    </body>

</html>
